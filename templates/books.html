{% extends "base.html" %}
{% block content %}
<h2>Books Catalog</h2>
<a href="{{ url_for('new_book') }}" class="btn btn-primary mb-3">+ Add New Book</a>
<table class="table table-hover">
    <thead>
        <tr><th>Title</th><th>Author</th><th>ISBN</th><th>Year</th><th>Copies</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.isbn or 'N/A' }}</td>
            <td>{{ book.year or 'N/A' }}</td>
            <td>{{ book.copies_available }}</td>
            <td>
                <a href="{{ url_for('edit_book', book_id=book.id) }}" class="btn btn-warning btn-sm">Edit</a>
                <form action="{{ url_for('delete_book', book_id=book.id) }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete this book?');">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
